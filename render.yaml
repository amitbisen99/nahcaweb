# Render Blueprint — staging environment for NAHCA (api + cms + a self-hosted MySQL).
#
# Render has no native managed MySQL, so we run MySQL ourselves as a private service
# with a persistent disk. This mirrors the "AWS-compatible VPS" target and stays fully
# portable to DigitalOcean later — nothing here is Render-specific except the syntax
# of this file itself.
#
# After connecting this repo as a Blueprint on Render, a few values can't be fully
# automated by Render's cross-service references and need a one-time manual paste.
# Each is marked `sync: false` below and explained in docs/RENDER-SETUP.md.

services:
  # --- MySQL (self-hosted, matches local XAMPP dev setup) ---
  - type: pserv
    name: nahca-mysql
    runtime: image
    image:
      url: docker.io/library/mysql:8.4
    disk:
      name: nahca-mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      # Auto-creates the API's database on first boot. The CMS's database
      # (nahca_cms) needs one manual `CREATE DATABASE` — see docs/RENDER-SETUP.md.
      - key: MYSQL_DATABASE
        value: nahca_app

  # --- apps/api (Express) ---
  - type: web
    name: nahca-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      # Compose manually as: mysql://root:<MYSQL_ROOT_PASSWORD>@<nahca-mysql internal host>:3306/nahca_app
      # Both values are visible on the nahca-mysql service's Environment tab once it's created.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@hinduchaplains.com
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MAILCHIMP_SERVER_PREFIX
        value: us1
      - key: MAILCHIMP_AUDIENCE_ID
        sync: false
      - key: ORG_NAME
        value: "North American Hindu Chaplains Association"
      - key: ORG_EIN
        value: "00-0000000"
      # The deployed web app's origin — Stripe success/cancel redirects go here.
      - key: WEB_ORIGIN
        sync: false

  # --- apps/cms (Strapi) ---
  - type: web
    name: nahca-cms
    runtime: node
    plan: free
    rootDir: apps/cms
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_CLIENT
        value: mysql
      - key: DATABASE_HOST
        fromService:
          type: pserv
          name: nahca-mysql
          property: host
      - key: DATABASE_PORT
        fromService:
          type: pserv
          name: nahca-mysql
          property: port
      - key: DATABASE_NAME
        value: nahca_cms
      - key: DATABASE_USERNAME
        value: root
      # Render Blueprints can't cross-reference another service's generateValue
      # secret directly — paste nahca-mysql's MYSQL_ROOT_PASSWORD here manually
      # (same value used for nahca-api's DATABASE_URL). See docs/RENDER-SETUP.md.
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_SSL
        value: false
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
